<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погодное приложение</title>
    <link rel="stylesheet" href="Home_Work_22.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
</head>

<body>
    <div class="container">
        <h1 class="bi bi-bank"> Узнайте погоду в вашем городе </h1>
        <form id="weatherForm">
            <input type="text" id="cityInput" placeholder="Введите название города" required />
            <button class="bi bi-cloud-sun" type="submit"> Узнать погоду</button>

        </form>

        <!-- Индикатор загрузки -->
        <div id="spinner" class="spinner-border text-primary hidden" role="status">
            <span class="visually-hidden">Загрузка...</span>
        </div>

        <!-- Текущая погода -->
        <div id="currentWeatherCard" class="card hidden"></div>
       

        <!-- Качество воздуха -->
        <div id="airQualityCard"  class="card hidden" >   
        </div>
        

        <!-- Прогноз на 5 дней -->
        <div id="forecastContainer" class="hidden"></div>

        <!-- Сообщение об ошибке -->
        <div id="errorCard" class="hidden"></div>
    </div>
    <script src="Home_Work_22.js"></script>
</body>

</html>
